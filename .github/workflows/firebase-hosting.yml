name: Deploy to Firebase Hosting on merge
on:
  push:
    push:
      branches: [ "deploy" ]
    pull_request:
      branches: [ "deploy" ]
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      - name: Build project
        run: |
          cd frontend
          npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_LMH_WRITTING_PRACTICE }}
          channelId: live
          projectId: lmh-writting-practice
          entryPoint: frontend