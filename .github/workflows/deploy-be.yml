name: Build and deploy

on:
  push:
    branches: ["deploy"]
  pull_request:
    branches: ["deploy"]
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ secrets.ACTOR}}/lmh-writting-practice:latest

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven
      # - name: Build with Maven
      #   working-directory: backend
      #   run: mvn clean install -Dspring.profiles.active=test -DskipTests
      - name: Login
        run: |
          echo ${{ secrets.PAT }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
      - name: Build and Publish
        run: |
          docker build ./backend --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
  deploy:
    needs: build
    name: deploy image to server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: false
          command_timeout: 15m
          script: |
            echo "== Create directory if not exist =="
            mkdir -p ${{ secrets.WORK_DIR }}
            cd ${{ secrets.WORK_DIR }}

            echo "== Create docker-compose.yml =="
            cat > docker-compose.yml << 'EOL'
            services:
              lmh-writting-practice:
                image: ghcr.io/${{ secrets.ACTOR}}/lmh-writting-practice:latest
                container_name: lmh-writting-practice
                restart: always
                depends_on:
                  - lmh-writting-practice-postgres
                  - lmh-writting-practice-redis
                ports:
                  - "8090:8081"
                environment:
                  SPRING_PROFILES_ACTIVE: deploy
                  SPRING_DATASOURCE_URL: jdbc:postgresql://lmh-writting-practice-postgres:5432/lmh-writting-practice
                  SPRING_DATASOURCE_USERNAME: postgres
                  SPRING_DATASOURCE_PASSWORD: 123456
                  SPRING_REDIS_HOST: lmh-writting-practice-redis
                  SPRING_REDIS_PORT: 6379
                volumes:
                  - /var/log/springboot:/var/log/springboot

              lmh-writting-practice-postgres:
                image: pgvector/pgvector:pg16
                container_name: lmh-writting-practice-postgres
                restart: always
                environment:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: 123456
                  POSTGRES_DB: lmh-writting-practice
                ports:
                  - "5432:5432"
                volumes:
                  - postgres_data:/var/lib/postgresql/data
                healthcheck:
                  test: ["CMD", "pg_isready", "-U", "postgres"]
                  interval: 10s
                  timeout: 5s
                  retries: 5
                
              lmh-writting-practice-redis:
                image: redis:7-alpine
                container_name: lmh-writting-practice-redis
                restart: always
                ports:
                  - "6379:6379"

            volumes:
              postgres_data:
            EOL
            echo "== Login to GHCR from server =="
            echo "${{ secrets.PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "== Pull new image and start container =="
            docker compose pull
            docker compose up -d --remove-orphans

            echo "== Done deploy =="
